name: Build and Release Multi-Platform App

on:
  # Push a semver tag (e.g. v1.0.1) to build + publish a release automatically.
  push:
    tags:
      - 'v*.*.*'
    branches:
      - '**'
  # Run nightly at 10 PM local time (19:00 UTC)
  schedule:
    - cron: '0 19 * * *'
  # Or trigger manually with custom title / draft / prerelease options.
  workflow_dispatch:

    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_title:
        description: 'Release Title (e.g. Release v1.0.0)'
        required: true
        default: 'Release v1.0.0'
      draft:
        description: 'Create Draft Release?'
        required: true
        type: boolean
        default: false
      prerelease:
        description: 'Is this a Pre-Release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # This action defaults RUSTFLAGS to "-D warnings", which turns any
          # compiler warning into a hard error and fails the release build.
          # Keep warnings non-fatal here (the source is warning-clean anyway).
          rustflags: ''

      - name: Build and install Rust ELF Parser extension
        run: |
          python -m pip install maturin
          # Build a wheel and pip-install it. `maturin develop` requires an
          # active virtualenv (absent on setup-python), so it fails in CI on
          # every platform; building a wheel and installing it does not.
          # `--find-links <dir> <name>` avoids shell glob issues (Windows pwsh).
          maturin build --release --manifest-path src/native/parser_rust/Cargo.toml --out target/wheels
          pip install --no-index --find-links target/wheels rust_elf_parser

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller ArchitectureValidatorPro.spec

      - name: Compress Directory (ZIP)
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ArchitectureValidatorPro -DestinationPath architecture-validator-pro-windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: architecture-validator-pro-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # This action defaults RUSTFLAGS to "-D warnings", which turns any
          # compiler warning into a hard error and fails the release build.
          # Keep warnings non-fatal here (the source is warning-clean anyway).
          rustflags: ''

      - name: Build and install Rust ELF Parser extension
        run: |
          python -m pip install maturin
          # Build a wheel and pip-install it. `maturin develop` requires an
          # active virtualenv (absent on setup-python), so it fails in CI on
          # every platform; building a wheel and installing it does not.
          # `--find-links <dir> <name>` avoids shell glob issues (Windows pwsh).
          maturin build --release --manifest-path src/native/parser_rust/Cargo.toml --out target/wheels
          pip install --no-index --find-links target/wheels rust_elf_parser

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller ArchitectureValidatorPro.spec

      - name: Compress macOS Bundle (ZIP)
        run: |
          cd dist
          zip -r ../architecture-validator-pro-macos.zip ArchitectureValidatorPro.app
          cd ..

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: architecture-validator-pro-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # This action defaults RUSTFLAGS to "-D warnings", which turns any
          # compiler warning into a hard error and fails the release build.
          # Keep warnings non-fatal here (the source is warning-clean anyway).
          rustflags: ''

      - name: Build and install Rust ELF Parser extension
        run: |
          python -m pip install maturin
          # Build a wheel and pip-install it. `maturin develop` requires an
          # active virtualenv (absent on setup-python), so it fails in CI on
          # every platform; building a wheel and installing it does not.
          # `--find-links <dir> <name>` avoids shell glob issues (Windows pwsh).
          # --compatibility linux: skip the manylinux repair (which needs
          # patchelf, absent on ubuntu-latest). This wheel is only consumed on
          # the runner by PyInstaller, never published, so manylinux compliance
          # is irrelevant — without this maturin build exits 1 on Linux.
          maturin build --release --manifest-path src/native/parser_rust/Cargo.toml --out target/wheels --compatibility linux
          pip install --no-index --find-links target/wheels rust_elf_parser

      - name: Install System Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y alien rpm build-essential xvfb

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller ArchitectureValidatorPro.spec

      - name: Package DEB and RPM
        run: |
          # 1. Structure the DEB layout
          mkdir -p debian-pkg/DEBIAN
          mkdir -p debian-pkg/usr/bin
          mkdir -p debian-pkg/usr/share/architecture-validator-pro
          mkdir -p debian-pkg/usr/share/applications
          
          # Copy compiled binary files
          cp -r dist/ArchitectureValidatorPro/* debian-pkg/usr/share/architecture-validator-pro/
          
          # Create launcher shell script
          cat << 'EOF' > debian-pkg/usr/bin/architecture-validator-pro
          #!/bin/sh
          exec /usr/share/architecture-validator-pro/ArchitectureValidatorPro "$@"
          EOF
          chmod +x debian-pkg/usr/bin/architecture-validator-pro
          
          # Create desktop application file
          cat << 'EOF' > debian-pkg/usr/share/applications/architecture-validator-pro.desktop
          [Desktop Entry]
          Type=Application
          Name=Architecture Validator Pro
          Comment=Automates the testing and verification of software architecture
          Exec=architecture-validator-pro
          Icon=architecture-validator-pro
          Terminal=false
          Categories=Development;Utility;
          EOF
          
          if [ "${{ github.ref_type }}" = "tag" ] || [ -n "${{ github.event.inputs.tag_name }}" ]; then
            RAW_VERSION="${{ github.event.inputs.tag_name || github.ref_name }}"
            VERSION="${RAW_VERSION#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA:0:8}"
          fi
          
          # Create Debian control metadata file
          cat << EOF > debian-pkg/DEBIAN/control
          Package: architecture-validator-pro
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Alex Masso <alexmasso96@github.com>
          Description: Architecture Validator Pro desktop application.
          Depends: libc6, libgl1
          EOF
          
          # 2. Build the DEB package
          dpkg-deb --build debian-pkg architecture-validator-pro-linux.deb
          
          # 3. Convert the DEB package to RPM package using alien
          sudo alien --to-rpm --scripts architecture-validator-pro-linux.deb
          
          # Rename generated RPM to a predictable filename
          mv architecture-validator-pro-*.rpm architecture-validator-pro-linux.rpm

      - name: Upload Linux DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-artifact
          path: architecture-validator-pro-linux.deb

      - name: Upload Linux RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm-artifact
          path: architecture-validator-pro-linux.rpm

      - name: Build Flatpak
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --user --install-deps-from=flathub --repo=flatpak-repo --force-clean builddir-flatpak flatpak-manifest.yml
          flatpak build-bundle flatpak-repo architecture-validator-pro-linux.flatpak com.architecturevalidator.ArchitectureValidatorPro --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Linux Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak-artifact
          path: architecture-validator-pro-linux.flatpak

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        # Check out the exact commit that triggered this run — works for both a
        # tag push and a manual workflow_dispatch. Do NOT check out
        # inputs.tag_name: on a manual run that tag does not exist yet, so the
        # checkout would fail and RELEASE_NOTES.md would never be available. The
        # release action below creates the tag itself from this commit.
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          # Anchor a dispatch-created tag to the commit we just built/checked out.
          target_commitish: ${{ github.sha }}
          name: ${{ github.event.inputs.release_title || format('Release {0}', github.ref_name) }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          make_latest: true
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            architecture-validator-pro-windows.zip
            architecture-validator-pro-macos.zip
            architecture-validator-pro-linux.deb
            architecture-validator-pro-linux.rpm
            architecture-validator-pro-linux.flatpak
