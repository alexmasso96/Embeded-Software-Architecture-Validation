name: Build Desktop App (pywebview)

# Phase 3 desktop shell (ArchitectureValidatorDesktop.spec): React SPA +
# FastAPI worker inside a native pywebview window. Separate from build.yml
# (the legacy PyQt build) so both can ship side-by-side during Phase 4.
#
# PyInstaller is not a cross-compiler — each OS builds its own artifact, so we
# fan out to windows/macos/linux runners. Every job builds the React frontend
# first (the spec bundles frontend/dist), then the Rust ELF parser wheel, then
# packages with PyInstaller.

on:
  push:
    tags:
      - 'desktop-v*.*.*'
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. desktop-v1.0.0)'
        required: true
        default: 'desktop-v1.0.0'
      release_title:
        description: 'Release Title'
        required: true
        default: 'Desktop Release'
      draft:
        description: 'Create Draft Release?'
        required: true
        type: boolean
        default: true
      prerelease:
        description: 'Is this a Pre-Release?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Build React frontend
        run: |
          cd src/frontend
          npm ci
          npm run build

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''

      - name: Build and install Rust ELF Parser extension
        run: |
          python -m pip install maturin
          maturin build --release --manifest-path src/native/parser_rust/Cargo.toml --out target/wheels
          pip install --no-index --find-links target/wheels rust_elf_parser

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ArchitectureValidatorDesktop.spec --noconfirm

      - name: Compress Directory (ZIP)
        shell: pwsh
        run: Compress-Archive -Path dist/ArchitectureValidator -DestinationPath architecture-validator-desktop-windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-artifact
          path: architecture-validator-desktop-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Build React frontend
        run: |
          cd src/frontend
          npm ci
          npm run build

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''

      - name: Build and install Rust ELF Parser extension
        run: |
          python -m pip install maturin
          maturin build --release --manifest-path src/native/parser_rust/Cargo.toml --out target/wheels
          pip install --no-index --find-links target/wheels rust_elf_parser

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ArchitectureValidatorDesktop.spec --noconfirm

      - name: Compress macOS Bundle (ZIP)
        run: |
          cd dist
          zip -r ../architecture-validator-desktop-macos.zip ArchitectureValidator.app
          cd ..

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-artifact
          path: architecture-validator-desktop-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Build React frontend
        run: |
          cd src/frontend
          npm ci
          npm run build

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''

      - name: Build and install Rust ELF Parser extension
        run: |
          python -m pip install maturin
          maturin build --release --manifest-path src/native/parser_rust/Cargo.toml --out target/wheels --compatibility linux
          pip install --no-index --find-links target/wheels rust_elf_parser

      - name: Install WebKitGTK runtime (pywebview's Linux backend)
        run: |
          sudo apt-get update
          # pywebview uses PyGObject + WebKit2GTK on Linux. These are system
          # libraries — PyInstaller cannot bundle the GTK stack, so the target
          # machine needs gir1.2-webkit2-4.1 / libwebkit2gtk installed too.
          sudo apt-get install -y python3-gi gir1.2-webkit2-4.1 libgirepository1.0-dev

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ArchitectureValidatorDesktop.spec --noconfirm

      - name: Compress Directory (tar.gz)
        run: |
          cd dist
          tar -czf ../architecture-validator-desktop-linux.tar.gz ArchitectureValidator
          cd ..

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-artifact
          path: architecture-validator-desktop-linux.tar.gz

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.event.inputs.release_title || format('Desktop {0}', github.ref_name) }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            architecture-validator-desktop-linux.tar.gz
            architecture-validator-desktop-windows.zip
            architecture-validator-desktop-macos.zip
