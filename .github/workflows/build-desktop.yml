name: Build Desktop App (pywebview)

# Single pipeline for the Phase 3 desktop shell (ArchitectureValidatorDesktop.spec):
# React SPA + FastAPI worker inside a native pywebview window.
#
#   test      → logic-layer pytest suite (Ubuntu).
#   build     → matrix over windows/macos/linux. PyInstaller is not a
#               cross-compiler, so each OS builds its own artifact; the matrix
#               keeps the three legs in ONE job definition (no copy-paste) while
#               still running them in parallel.
#   create-release → on a release (tag or manual dispatch) only: gather the
#               artifacts and publish the GitHub release. Gated on `test` so a
#               red suite never ships.

on:
  push:
    tags:
      # Release tags. Accept the repo's historical convention (v3.0.0 / V3.0.0)
      # as well as the namespaced desktop-v* form. The gate/version steps below
      # normalise all of these.
      - 'v*'
      - 'V*'
      - 'desktop-v*'
    branches:
      - '**'
  pull_request:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. V1.0.0)'
        required: true
        default: 'V1.0.0'
      release_title:
        description: 'Release Title'
        required: true
        default: 'Desktop Release'
      draft:
        description: 'Create Draft Release?'
        required: true
        type: boolean
        default: true
      prerelease:
        description: 'Is this a Pre-Release?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Build React frontend
        run: |
          cd src/frontend
          npm ci
          npm run build

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run test suite
        run: pytest Tests/ -q

  build:
    # Skip the heavy 3-OS build on the nightly cron — that run only needs `test`.
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Build React frontend
        run: |
          cd src/frontend
          npm ci
          npm run build

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''

      - name: Build and install Rust ELF Parser extension
        shell: bash
        run: |
          python -m pip install maturin
          # Linux needs --compatibility linux (no patchelf on the runner image).
          EXTRA=""
          if [ "$RUNNER_OS" = "Linux" ]; then EXTRA="--compatibility linux"; fi
          maturin build --release --manifest-path src/native/parser_rust/Cargo.toml --out target/wheels $EXTRA
          pip install --no-index --find-links target/wheels rust_elf_parser

      - name: Install WebKitGTK runtime (Linux pywebview backend)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # pywebview uses PyGObject + WebKit2GTK on Linux. These are system
          # libraries — PyInstaller cannot bundle the GTK stack, so the target
          # machine needs gir1.2-webkit2-4.1 / libwebkit2gtk installed too.
          sudo apt-get install -y python3-gi gir1.2-webkit2-4.1 libgirepository1.0-dev

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ArchitectureValidatorDesktop.spec --noconfirm

      # --- Package: Windows -------------------------------------------------
      - name: Package Windows (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/ArchitectureValidator -DestinationPath architecture-validator-desktop-windows.zip

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-artifact
          path: architecture-validator-desktop-windows.zip

      # --- Package: macOS ---------------------------------------------------
      - name: Package macOS (zip)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../architecture-validator-desktop-macos.zip ArchitectureValidator.app

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-artifact
          path: architecture-validator-desktop-macos.zip

      # --- Package: Linux (.deb / .rpm / .flatpak) --------------------------
      # Only on a release (tag or manual dispatch): the flatpak runtime download
      # + 3-format packaging is heavy, and branch pushes only need to prove the
      # PyInstaller bundle compiles.
      - name: Gate packaging to releases
        if: runner.os == 'Linux'
        id: gate
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*|refs/tags/V*|refs/tags/desktop-v*) echo "is_release=true" >> "$GITHUB_OUTPUT" ;;
            *) if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
                 echo "is_release=true" >> "$GITHUB_OUTPUT"
               else
                 echo "is_release=false" >> "$GITHUB_OUTPUT"
               fi ;;
          esac

      - name: Derive package version
        if: runner.os == 'Linux' && steps.gate.outputs.is_release == 'true'
        id: ver
        run: |
          # On a manual dispatch GITHUB_REF_NAME is the *branch* (e.g. "main"), so
          # prefer the tag_name the user typed. Strip an optional "desktop-" prefix
          # and a leading v/V so "V3.0.0", "v3.0.0" and "desktop-v3.0.0" all yield
          # "3.0.0". fpm rejects a non-numeric version, hence the 0.0.0 fallback.
          RAW="${{ github.event.inputs.tag_name || github.ref_name }}"
          VER="${RAW#desktop-}"
          VER="${VER#[vV]}"
          [[ "$VER" =~ ^[0-9]+(\.[0-9]+)*$ ]] || VER="0.0.0"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Install packaging toolchains (fpm + flatpak)
        if: runner.os == 'Linux' && steps.gate.outputs.is_release == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm flatpak flatpak-builder
          sudo gem install --no-document fpm
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build .deb / .rpm / .flatpak
        if: runner.os == 'Linux' && steps.gate.outputs.is_release == 'true'
        run: VERSION="${{ steps.ver.outputs.version }}" ./scripts/package_linux.sh

      - name: Upload Linux artifacts
        if: runner.os == 'Linux' && steps.gate.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-artifact
          path: |
            architecture-validator-desktop-linux.deb
            architecture-validator-desktop-linux.rpm
            architecture-validator-desktop-linux.flatpak

  create-release:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ github.event.inputs.release_title || format('Desktop {0}', github.ref_name) }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          # Use the curated, hand-written notes as the release body (the V2
          # behaviour). The create-release job checks out github.sha above, so
          # RELEASE_NOTES.md from that commit is on disk here. generate_release_notes
          # is intentionally NOT set: it would override this with an auto commit list.
          body_path: RELEASE_NOTES.md
          files: |
            architecture-validator-desktop-linux.deb
            architecture-validator-desktop-linux.rpm
            architecture-validator-desktop-linux.flatpak
            architecture-validator-desktop-windows.zip
            architecture-validator-desktop-macos.zip
