name: Tests

on:
  push:
  pull_request:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Run PyQt6 headlessly — no display server needed in CI.
  QT_QPA_PLATFORM: offscreen

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Test Suite
        run: pytest Tests/ -q
